name: Daily Reviews Scrape

on:
  schedule:
    # 8am EST = 13:00 UTC (accounts for EST; adjust to 12:00 UTC during EDT/summer)
    - cron: '0 13 * * *'
  workflow_dispatch: # allow manual runs from the GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: npm run scrape

      - name: Send email digest
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: npm run notify

      - name: Commit updated reviews.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reviews.json
          git diff --staged --quiet || git commit -m "chore: update reviews.json [skip ci]"
          git push

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_h7WePecZCBCWTxCNfmkCtOIy
          VERCEL_PROJECT_ID: prj_QJ71DTZeyCtTMcwk0njkoDGthu4y
        run: npx vercel deploy --prod --token=$VERCEL_TOKEN
